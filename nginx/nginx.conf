# Minimal bootstrap config for `nginx -t` in CI.
# Phase 1+ will replace paths with user-writable runtime dirs.

worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/home-warden-nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /dev/stdout;
    server {
        listen 127.0.0.1:8080;
        server_name _;
        location / {
            return 200 "home-warden bootstrap\n";
            add_header Content-Type text/plain;
        }
    }
}
